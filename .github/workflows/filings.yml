name: filings

# Fast lane for the TIME-SENSITIVE collectors only (MAYA + SEC filings).
# Split out of collect.yml per research/FRESHNESS_FINDINGS.md D2: sources are
# near-real-time (SEC <1 min, measured), so the GitHub Actions schedule queue is
# the whole bottleneck. news/email/prices/macro stay on the slower collect.yml.

on:
  schedule:
    # Every 5 minutes, PHASE-SHIFTED +3 off :00/:15/:30/:45 — GitHub documents
    # that scheduled events are delayed under load and that load peaks at the
    # top of the hour, exactly where */N fires (FRESHNESS_FINDINGS.md C1).
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"
  workflow_dispatch: {}

concurrency:
  group: desk-filings
  cancel-in-progress: false

jobs:
  filings:
    runs-on: ubuntu-latest
    env:
      DESK_DB_URL: ${{ secrets.DESK_DB_URL }}
      DESK_DEFAULT_USER: ${{ secrets.DESK_DEFAULT_USER }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Pre-seed the Chromium download (~150 MB) between runs. SAFE by
      # construction: the install step below ALWAYS runs and validates the
      # browser build for the installed playwright version — a stale or missing
      # cache degrades to a fresh download, never a broken run. (playwright is
      # unpinned in requirements.txt, so this key can go stale on a version
      # bump; that costs one re-download, nothing else.)
      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Chromium (for MAYA cookie harvest)
        run: python -m playwright install --with-deps chromium

      - name: Require DESK_DB_URL
        run: |
          if [ -z "$DESK_DB_URL" ]; then
            echo "::error::DESK_DB_URL secret is not set — refusing to run against no persistent DB."
            exit 1
          fi

      # MAYA first: it is fail-soft end to end (gate blocked -> logs + exit 0).
      # One cookie harvest per run; fail-soft if the Imperva gate blocks this IP.
      - name: Collect MAYA filings
        run: python -m desk.collect_maya

      # SEC last: the only step with a hard-fail mode (SystemExit if
      # SEC_USER_AGENT is unset), so a config error can never block MAYA.
      # --commit is required: the CLI defaults to dry-run.
      - name: Collect SEC filings
        run: python -m desk.collect_sec --commit
