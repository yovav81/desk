name: collect

on:
  schedule:
    # Every 15 minutes, phase-shifted +7 off the :00/:15/:30/:45 congestion
    # peaks (and off filings.yml's +3 lane). Filings run in filings.yml.
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch: {}

concurrency:
  group: desk-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      DESK_DB_URL: ${{ secrets.DESK_DB_URL }}
      DESK_DEFAULT_USER: ${{ secrets.DESK_DEFAULT_USER }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Require DESK_DB_URL
        run: |
          if [ -z "$DESK_DB_URL" ]; then
            echo "::error::DESK_DB_URL secret is not set — refusing to run against no persistent DB."
            exit 1
          fi

      - name: Collect news
        run: python -m desk.collect_news

      - name: Collect macro news
        run: python -m desk.collect_macro

      - name: Collect email
        run: python -m desk.collect_email

      # BEFORE prices, so a just-added TASE security gets its ticker and its
      # first quote in the SAME run. Steady state (nothing to enrich) makes
      # zero Yahoo requests. --commit is required: the CLI defaults to dry-run.
      - name: Enrich TASE tickers
        run: python -m desk.collect_enrich --commit

      - name: Collect prices
        run: python -m desk.collect_prices

      # MAYA + SEC filings moved to .github/workflows/filings.yml (5-min fast
      # lane) — running them here too would double-poll MAYA and burn queue slots.

      # Dead-man ping — MUST stay the LAST step and MUST NOT get `if: always()`:
      # with no continue-on-error above, it runs only when every collector
      # succeeded, so a red run = no ping = Healthchecks alert (silence itself
      # is the alarm). `|| true`: a Healthchecks hiccup at worst delays one
      # alert; failing a green run over a monitoring blip would invert the
      # dependency. -fsS: fail on HTTP errors, silent, no URL in logs.
      - name: Ping healthcheck
        env:
          HC_PING_COLLECT: ${{ secrets.HC_PING_COLLECT }}
        run: curl -fsS -m 10 --retry 3 "$HC_PING_COLLECT" > /dev/null || true
